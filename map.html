<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>関係マップボード 🕵️</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --c-friend:#4a9fff; --c-talk:#3fd8c7; --c-common:#4ccf8f;
    --c-group:#ff9b42; --c-compat:#ffc93f;
    --bg1:#14151f; --bg2:#1c1e2e; --card:#252840; --card2:#2e3150;
  }
  html, body { height:100%; overflow:hidden; overscroll-behavior:none; touch-action:manipulation; }
  button, .tbtn, .nlabel, #legend, #topbar, #panel, #fmenu { touch-action:manipulation; }
  body {
    font-family:"Hiragino Maru Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    background:var(--bg1); color:#eee;
  }
  /* 🔒 あいことばロック */
  #lock {
    position:fixed; inset:0; z-index:999;
    background:linear-gradient(135deg,#14151f,#1d1b30 60%,#241d33);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; padding:24px; text-align:center;
  }
  #lock h2 { color:#ffd8e6; font-size:1.3rem; letter-spacing:0.1em; }
  #lock p { color:#8a82b0; font-size:0.85rem; }
  #lock input {
    font-size:1.1rem; padding:12px 18px; border-radius:999px;
    border:2px solid #8f7bff; background:rgba(255,255,255,0.08);
    color:#fff; outline:none; text-align:center; width:min(260px,80vw);
    font-family:inherit;
  }
  #lock button {
    font-size:1rem; padding:12px 36px; border:none; border-radius:999px;
    background:linear-gradient(90deg,#ff6fa5,#8f7bff); color:#fff;
    font-weight:bold; cursor:pointer; font-family:inherit;
  }
  #lock .err { color:#ff7a9a; font-size:0.85rem; min-height:1.2em; }
  /* ===== ボード（全画面） ===== */
  #board {
    position:fixed; inset:0; overflow:hidden; touch-action:none;
    background:
      radial-gradient(rgba(255,255,255,0.07) 1.2px, transparent 1.2px),
      linear-gradient(135deg,#171826 0%,#1d1b30 60%,#241d33 100%);
    background-size:26px 26px, 100% 100%;
    cursor:grab;
  }
  #board.panning { cursor:grabbing; }
  #world { position:absolute; left:0; top:0; transform-origin:0 0; }
  #wires {
    position:absolute; left:0; top:0; width:1px; height:1px; overflow:visible;
  }
  #wires line { pointer-events:none; }
  #wires .hit { cursor:pointer; pointer-events:stroke; }
  /* ===== 人物ノード ===== */
  .node {
    position:absolute; transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center;
    cursor:pointer; user-select:none; -webkit-user-select:none;
    touch-action:none; z-index:5;
  }
  .circle {
    width:64px; height:64px; border-radius:50%;
    background:linear-gradient(135deg,#ff8fb3,#a08fff);
    display:flex; align-items:center; justify-content:center;
    font-size:1.8rem; overflow:hidden;
    border:3px solid #fff; box-shadow:0 3px 14px rgba(0,0,0,0.5);
  }
  .circle img { width:100%; height:100%; object-fit:cover; pointer-events:none; }
  .node.girl .circle { border-color:#ff7ab0; }
  .node.boy .circle {
    border-color:#4a9fff;
    background:linear-gradient(135deg,#6fb6ff,#7b8cff);
  }
  .g-toggle { display:flex; gap:8px; margin-top:6px; }
  .g-toggle button {
    border:none; border-radius:999px; padding:5px 14px;
    font-size:0.75rem; font-weight:bold; cursor:pointer; font-family:inherit;
    background:rgba(255,255,255,0.1); color:#999;
  }
  .g-toggle button.girl.on { background:#ff7ab0; color:#fff; }
  .g-toggle button.boy.on { background:#4a9fff; color:#fff; }
  .node.selected .circle {
    border-color:#ffd23f;
    box-shadow:0 0 0 4px rgba(255,210,63,0.35), 0 3px 14px rgba(0,0,0,0.5);
  }
  .node.dim { opacity:0.3; }
  .nlabel {
    position:absolute; top:100%; left:50%; transform:translateX(-50%);
    margin-top:5px; font-size:0.8rem; font-weight:bold; color:#fff;
    background:rgba(0,0,0,0.55); padding:2px 11px; border-radius:999px;
    white-space:nowrap; pointer-events:none;
  }
  .linker {
    position:absolute; top:-14px; right:-16px;
    width:34px; height:34px; border-radius:50%;
    background:#ffd23f; color:#333; border:2px solid #fff;
    display:none; align-items:center; justify-content:center;
    font-size:1rem; cursor:crosshair; z-index:6;
    box-shadow:0 2px 8px rgba(0,0,0,0.5);
    touch-action:none;
  }
  .node.selected .linker { display:flex; }
  /* ===== ヘッダー・ツールバー ===== */
  #topbar {
    position:fixed; top:0; left:0; right:0; z-index:40;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:10px 12px; pointer-events:none;
  }
  #topbar > * { pointer-events:auto; }
  #title {
    font-size:0.95rem; font-weight:bold;
    background:rgba(0,0,0,0.5); padding:7px 16px; border-radius:999px;
    color:#ffd8e6;
  }
  .tbtn {
    border:none; border-radius:999px; padding:8px 14px;
    font-size:0.8rem; font-weight:bold; cursor:pointer; font-family:inherit;
    background:rgba(255,255,255,0.14); color:#eee;
    backdrop-filter:blur(4px);
  }
  .tbtn.accent { background:linear-gradient(90deg,#ff6fa5,#8f7bff); color:#fff; }
  .tbtn.off { opacity:0.5; }
  #legend {
    position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
    z-index:40; display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
    background:rgba(0,0,0,0.55); border-radius:999px;
    padding:7px 16px; font-size:0.68rem; color:#ccc;
    max-width:95vw;
  }
  #legend span { display:flex; align-items:center; gap:4px; white-space:nowrap; }
  #legend i { width:16px; height:4px; border-radius:2px; display:inline-block; }
  #zoomCtl {
    position:fixed; right:12px; bottom:56px; z-index:40;
    display:flex; flex-direction:column; gap:6px;
  }
  #zoomCtl button {
    width:40px; height:40px; border-radius:50%; border:none;
    background:rgba(255,255,255,0.15); color:#fff; font-size:1.1rem;
    cursor:pointer; backdrop-filter:blur(4px);
  }
  /* 🔗 線を引くモードボタン */
  #lineFab {
    position:fixed; right:12px; bottom:180px; z-index:40;
    width:54px; height:54px; border-radius:50%; border:none;
    background:rgba(255,255,255,0.15); color:#fff; font-size:1.5rem;
    cursor:pointer; backdrop-filter:blur(4px);
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
  }
  #lineFab.on {
    background:linear-gradient(135deg,#ffd23f,#ff9b42); color:#333;
    box-shadow:0 0 0 4px rgba(255,210,63,0.4), 0 4px 14px rgba(0,0,0,0.5);
  }
  /* ↩️ 元に戻すボタン */
  #undoFab {
    position:fixed; right:12px; bottom:245px; z-index:40;
    width:54px; height:54px; border-radius:50%; border:none;
    background:rgba(255,255,255,0.15); color:#fff; font-size:1.5rem;
    cursor:pointer; backdrop-filter:blur(4px);
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
  }
  /* 🎯 フォーカスモードのバー */
  #focusBar {
    position:fixed; top:62px; left:50%; transform:translateX(-50%);
    z-index:45; display:none; align-items:center; gap:10px;
    background:linear-gradient(90deg,#ff6fa5,#8f7bff); color:#fff;
    font-size:0.85rem; font-weight:bold; padding:8px 10px 8px 16px;
    border-radius:999px; box-shadow:0 6px 20px rgba(0,0,0,0.5);
    max-width:92vw; white-space:nowrap;
  }
  #focusBar button {
    background:rgba(255,255,255,0.25); border:none; color:#fff;
    border-radius:999px; padding:5px 14px; cursor:pointer;
    font-family:inherit; font-size:0.8rem; font-weight:bold;
  }
  /* ===== 詳細パネル（直接編集） ===== */
  #panel {
    position:fixed; z-index:60;
    background:var(--card); box-shadow:0 0 40px rgba(0,0,0,0.6);
    right:0; top:0; bottom:0; width:min(370px,100vw);
    transform:translateX(105%); transition:transform .22s;
    overflow-y:auto; padding:18px 16px 40px;
  }
  #panel.open { transform:translateX(0); }
  @media (max-width:600px) {
    #panel {
      left:0; right:0; top:auto; bottom:0; width:100%;
      max-height:62vh; border-radius:20px 20px 0 0;
      transform:translateY(105%);
    }
    #panel.open { transform:translateY(0); }
  }
  #panel .close {
    position:absolute; top:12px; right:12px;
    background:rgba(255,255,255,0.12); border:none; color:#ccc;
    width:32px; height:32px; border-radius:50%; font-size:1rem; cursor:pointer;
  }
  .p-head { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .p-avatar {
    width:66px; height:66px; border-radius:50%; overflow:hidden; flex-shrink:0;
    background:linear-gradient(135deg,#ff8fb3,#a08fff);
    display:flex; align-items:center; justify-content:center; font-size:1.8rem;
    border:3px solid #fff; cursor:pointer; position:relative;
  }
  .p-avatar img { width:100%; height:100%; object-fit:cover; pointer-events:none; }
  .p-avatar input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .p-avatar-hint { font-size:0.65rem; color:#8a82b0; }
  .p-name-input {
    width:100%; background:transparent; border:none; border-bottom:2px solid rgba(255,255,255,0.2);
    color:#fff; font-size:1.25rem; font-weight:bold; font-family:inherit;
    padding:4px 2px; outline:none;
  }
  .p-name-input:focus { border-color:#ff8fb3; }
  .sec { margin-top:12px; }
  .sec label {
    display:block; font-size:0.7rem; color:#b3a6e8; margin-bottom:4px;
    border-left:3px solid #8f7bff; padding-left:8px;
  }
  .sec textarea {
    width:100%; background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.14); border-radius:12px;
    color:#eee; font-size:0.85rem; font-family:inherit;
    padding:9px 12px; outline:none; resize:vertical; min-height:44px;
    line-height:1.5;
  }
  .sec textarea:focus { border-color:#8f7bff; }
  .rel-item {
    display:flex; align-items:center; gap:8px;
    background:rgba(255,255,255,0.06); border-radius:12px;
    padding:8px 10px; margin-bottom:6px; font-size:0.8rem; cursor:pointer;
  }
  .rel-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .rel-tag {
    font-size:0.6rem; padding:2px 8px; border-radius:999px; margin-left:auto;
    background:rgba(255,255,255,0.12); color:#bbb; flex-shrink:0;
  }
  .rel-tag.pred { background:rgba(255,201,63,0.2); color:#ffc93f; }
  .rel-del { background:none; border:none; color:#ff7a9a; font-size:1rem; cursor:pointer; padding:0 3px; }
  .empty { color:#7a7398; font-size:0.75rem; }
  .p-foot { margin-top:16px; display:flex; gap:8px; }
  .p-foot button {
    flex:1; border:none; border-radius:12px; padding:10px;
    font-size:0.8rem; font-weight:bold; cursor:pointer; font-family:inherit;
  }
  .p-foot .link { background:rgba(255,210,63,0.2); color:#ffd23f; }
  .p-foot .del { background:rgba(255,80,120,0.2); color:#ff9ab5; }
  /* ===== フローティングメニュー ===== */
  #fmenu {
    position:fixed; z-index:90; display:none;
    background:var(--card2); border-radius:16px;
    box-shadow:0 8px 30px rgba(0,0,0,0.6);
    padding:8px; min-width:190px;
  }
  #fmenu button {
    display:flex; align-items:center; gap:8px; width:100%;
    background:none; border:none; color:#eee; font-family:inherit;
    font-size:0.85rem; padding:9px 12px; border-radius:10px; cursor:pointer;
    text-align:left;
  }
  #fmenu button:hover, #fmenu button:active { background:rgba(255,255,255,0.1); }
  #fmenu { max-height:60vh; overflow-y:auto; }
  /* スマホ(タッチ端末)は全部大きめに */
  @media (pointer:coarse) {
    .circle { width:92px; height:92px; font-size:2.6rem; border-width:4px; }
    .nlabel { font-size:1.05rem; padding:4px 16px; }
    .linker { width:52px; height:52px; font-size:1.5rem; top:-20px; right:-24px; }
    .tbtn { padding:11px 18px; font-size:0.9rem; }
    #fmenu button { padding:14px 16px; font-size:1rem; }
    #zoomCtl button { width:50px; height:50px; font-size:1.35rem; }
    #legend { display:none; } /* スマホでは色の説明を消してスッキリ */
    #topbar { padding:6px 8px; gap:6px; }
    #menuToggle { padding:6px 12px !important; font-size:0.95rem !important; }
  }
  /* ☰ボタンでツールバー一式を表示/非表示 */
  #menuToggle { font-size:1.05rem; }
  #tools { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  #tools.hidden { display:none !important; }
  @media (max-width:700px), (pointer:coarse) {
    #tools {
      flex-direction:column; align-items:stretch; gap:7px;
      background:rgba(10,10,22,0.95); border-radius:18px; padding:12px;
      box-shadow:0 8px 30px rgba(0,0,0,0.6);
      max-height:70vh; overflow-y:auto;
    }
    #tools .tbtn { text-align:left; }
    #title { font-size:0.8rem; padding:6px 12px; text-align:center; }
  }
  #fmenu button.sel { background:rgba(255,255,255,0.14); }
  #fmenu .dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
  #fmenu hr { border:none; border-top:1px solid rgba(255,255,255,0.12); margin:6px 4px; }
  /* 📇 人物カルテ（履歴書風） */
  #karte {
    position:fixed; inset:0; z-index:110; background:rgba(0,0,0,0.75);
    display:none; align-items:center; justify-content:center; padding:14px;
    backdrop-filter:blur(3px);
  }
  #karte.open { display:flex; }
  .k-paper {
    width:min(460px,100%); max-height:90vh; overflow-y:auto;
    background:#f7f4ec; color:#2a2620; border-radius:6px;
    padding:22px 20px 26px; position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
    font-family:"Yu Mincho","Hiragino Mincho ProN",serif;
  }
  .k-head {
    display:flex; justify-content:space-between; align-items:flex-start;
    border-bottom:3px double #2a2620; padding-bottom:10px; margin-bottom:2px;
  }
  .k-title { font-size:1.25rem; font-weight:bold; letter-spacing:0.35em; }
  .k-no { font-size:0.65rem; color:#8a8378; margin-top:6px; }
  .k-photo {
    width:86px; height:106px; object-fit:cover;
    border:1px solid #2a2620; background:#ddd;
  }
  .k-nophoto {
    width:86px; height:106px; border:1px dashed #8a8378;
    display:flex; align-items:center; justify-content:center;
    color:#8a8378; font-size:0.65rem;
  }
  .k-namebox { padding:10px 4px 8px; }
  .k-kname { font-size:1.7rem; font-weight:bold; letter-spacing:0.15em; }
  .k-nick { font-size:0.8rem; color:#6a6458; margin-top:2px; }
  table.k-tbl { width:100%; border-collapse:collapse; margin-top:8px; }
  .k-tbl th, .k-tbl td {
    border:1px solid #4a443a; padding:8px 10px; font-size:0.83rem;
    text-align:left; vertical-align:top; line-height:1.6;
  }
  .k-tbl th {
    background:#e8e2d2; width:92px; font-weight:bold;
    letter-spacing:0.1em; white-space:nowrap;
  }
  .k-stamp {
    position:absolute; top:16px; right:120px;
    border:2px solid #c0392b; color:#c0392b; border-radius:4px;
    font-size:0.6rem; font-weight:bold; padding:3px 7px;
    transform:rotate(-8deg); letter-spacing:0.2em; opacity:0.85;
  }
  .k-date { text-align:right; font-size:0.65rem; color:#8a8378; margin-top:10px; }
  #kClose {
    display:block; margin:14px auto 0; border:none; border-radius:999px;
    padding:10px 36px; font-family:inherit; font-weight:bold; cursor:pointer;
    background:#2a2620; color:#f7f4ec; font-size:0.85rem; letter-spacing:0.2em;
  }
  .p-karte-btn {
    width:100%; margin-top:14px; border:none; border-radius:12px;
    padding:12px; font-size:0.88rem; font-weight:bold; cursor:pointer;
    font-family:inherit; color:#fff;
    background:linear-gradient(90deg,#c9a84c,#8f7bff);
  }
  /* ⚡ かんたん入力 */
  #quickIn {
    position:fixed; inset:0; z-index:115; background:rgba(0,0,0,0.7);
    display:none; align-items:center; justify-content:center; padding:16px;
    backdrop-filter:blur(3px);
  }
  #quickIn.open { display:flex; }
  .q-card {
    width:min(440px,100%); max-height:88vh; overflow-y:auto;
    background:var(--card2); border-radius:20px; padding:20px 18px;
    box-shadow:0 16px 50px rgba(0,0,0,0.6);
  }
  .q-card h3 { font-size:1rem; color:#7fe3d3; margin-bottom:10px; }
  #qText {
    width:100%; min-height:84px; resize:vertical;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.25);
    border-radius:14px; color:#fff; font-size:0.95rem; font-family:inherit;
    padding:11px 13px; outline:none; line-height:1.6;
  }
  .q-btns { display:flex; gap:8px; margin-top:10px; }
  .q-btns button {
    flex:1; border:none; border-radius:12px; padding:12px;
    font-size:0.9rem; font-weight:bold; cursor:pointer; font-family:inherit; color:#fff;
  }
  #qMic { background:rgba(255,255,255,0.14); }
  #qMic.rec { background:linear-gradient(90deg,#ff5a6e,#ff9b42); animation:blink 1s infinite; }
  @keyframes blink { 50% { opacity:0.6; } }
  #qSave { background:linear-gradient(90deg,#3fd8c7,#4a9fff); }
  #qPreview { margin-top:12px; }
  .q-row {
    background:rgba(255,255,255,0.06); border-radius:10px;
    padding:7px 11px; margin-bottom:5px; font-size:0.82rem; line-height:1.5;
  }
  .q-row b { color:#7fe3d3; }
  .q-hint { font-size:0.68rem; color:#8a82b0; margin-top:8px; line-height:1.5; }
  /* 💬 チャット */
  #chatFab {
    position:fixed; left:12px; bottom:56px; z-index:40;
    width:54px; height:54px; border-radius:50%; border:none;
    background:linear-gradient(135deg,#ff6fa5,#8f7bff); color:#fff;
    font-size:1.5rem; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.5);
  }
  #chatFab.unread::after {
    content:""; position:absolute; top:4px; right:4px;
    width:14px; height:14px; border-radius:50%;
    background:#ff3b5c; border:2px solid #fff;
  }
  #chatBox {
    position:fixed; left:10px; bottom:10px; z-index:75;
    width:min(340px,94vw); height:52vh; display:none;
    flex-direction:column; background:var(--card);
    border-radius:18px; box-shadow:0 10px 40px rgba(0,0,0,0.6);
    overflow:hidden;
  }
  #chatBox.open { display:flex; }
  #chatHead {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; font-size:0.9rem; font-weight:bold;
    background:rgba(255,255,255,0.07);
  }
  #chatHead button {
    background:rgba(255,255,255,0.12); border:none; color:#ccc;
    width:28px; height:28px; border-radius:50%; cursor:pointer;
  }
  #chatMsgs { flex:1; overflow-y:auto; padding:8px 10px; }
  .cmsg { margin-bottom:8px; }
  .cname { font-size:0.68rem; color:#ffd23f; font-weight:bold; }
  .ctime { font-size:0.6rem; color:#8a82b0; margin-left:6px; }
  .cread { font-size:0.62rem; color:#9fe0a0; margin-left:6px; }
  .ctext {
    font-size:0.88rem; line-height:1.4; color:#eee;
    background:rgba(255,255,255,0.08); border-radius:0 12px 12px 12px;
    padding:7px 11px; display:inline-block; max-width:90%;
    word-break:break-word;
  }
  #chatRow {
    display:flex; gap:6px; padding:8px;
    background:rgba(255,255,255,0.05);
  }
  #chatRow input {
    border:1px solid rgba(255,255,255,0.2); border-radius:999px;
    background:rgba(255,255,255,0.08); color:#fff;
    padding:9px 13px; font-size:0.85rem; font-family:inherit; outline:none;
  }
  #chatName { width:76px; flex:0 0 auto; }
  #chatText { flex:1; min-width:0; }
  #chatSend {
    border:none; border-radius:50%; width:40px; height:40px; flex:0 0 auto;
    background:linear-gradient(135deg,#ff6fa5,#8f7bff); color:#fff;
    font-size:1rem; cursor:pointer;
  }
  #toast {
    position:fixed; top:60px; left:50%; transform:translateX(-50%);
    z-index:95; background:rgba(255,210,63,0.95); color:#332;
    font-size:0.8rem; font-weight:bold; padding:9px 20px; border-radius:999px;

/* ================= ガチ同期設定 =================
   Firebaseのコンソールでもらえる firebaseConfig を
   下の {} の中にそのまま貼り付けると同期がONになる。
   例:
   const FIREBASE_CONFIG = {

================================================== */

/* ================= 🔐 あいことばロック＋エンドツーエンド暗号化 =================
   あいことば＝暗号化の鍵。クラウドには暗号文しか置かない。
   合言葉を知らない限り、誰にも（Googleにも）データは読めない。 */
const AIKOTOBA_HASH = '4d865e9a888f28ed1e3f6c29429068e752dd78f04f74de89d909b820d84f73e2';
const PP_STORE = 'aikotoba_pp';
let cryptoKey = null;

async function sha256hex(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}
async function deriveKey(pp) {
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pp), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: new TextEncoder().encode('kankeiMapSalt1'), iterations: 150000, hash:'SHA-256' },
    base, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
}
function b64(u8) {
  let s = ''; const CH = 0x8000;
  for (let i = 0; i < u8.length; i += CH) s += String.fromCharCode.apply(null, u8.subarray(i, i + CH));
  return btoa(s);
}
function ub64(s) {
  const bin = atob(s); const u = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
  return u;
}
/* オブジェクト→暗号文パック */
async function encObj(obj) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, cryptoKey, new TextEncoder().encode(JSON.stringify(obj)));
  return { e:1, iv: b64(iv), d: b64(new Uint8Array(ct)) };
}
/* 暗号文パック→オブジェクト（鍵が違うと例外になる） */
async function decObj(pack) {
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv: ub64(pack.iv) }, cryptoKey, ub64(pack.d));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* 鍵の準備ができたら resolve されるPromise（同期はこの後に始まる） */
const cryptoReady = (async () => {
  const lockEl = document.getElementById('lock');
  const saved = localStorage.getItem(PP_STORE);
  if (saved && (await sha256hex(saved)) === AIKOTOBA_HASH) {
    cryptoKey = await deriveKey(saved);
    lockEl.remove();
    return;
  }
  await new Promise(resolve => {
    async function tryOpen() {
      const input = document.getElementById('lockPw').value.trim();
      if ((await sha256hex(input)) === AIKOTOBA_HASH) {
        localStorage.setItem(PP_STORE, input); /* この端末は次から自動 */
        cryptoKey = await deriveKey(input);
        lockEl.remove();
        resolve();

        document.getElementById('lockErr').textContent = 'あいことばが違うよ…';
        document.getElementById('lockPw').value = '';
      }

    document.getElementById('lockBtn').onclick = tryOpen;

})();

/* ================= ビュー（パン・ズーム） ================= */
const board = document.getElementById('board');
const world = document.getElementById('world');
const wires = document.getElementById('wires');

let view = state.view || { x:0, y:0, z:1 };

function applyView() {
  world.style.transform = `translate(${view.x}px,${view.y}px) scale(${view.z})`;
  state.view = view; saveSoon();
}
let saveTimer = null;
function saveSoon() { clearTimeout(saveTimer); saveTimer = setTimeout(save, 400); }

const toWorld = (cx, cy) => ({ x:(cx - view.x)/view.z, y:(cy - view.y)/view.z });

function zoomAt(cx, cy, factor) {
  const nz = Math.min(3, Math.max(0.2, view.z * factor));
  const w = toWorld(cx, cy);
  view.x = cx - w.x * nz;
  view.y = cy - w.y * nz;
  view.z = nz;
  applyView();
}

function fitView() {
  let vis = state.people.filter(p => typeof isVisible === 'function' ? isVisible(p) : true);
  /* フォーカス中はその人のグループに寄せる */
  if (typeof focusId !== 'undefined' && focusId) {
    const grp = vis.filter(p => inFocusGroup(p));
    if (grp.length) vis = grp;
  }
  const list = vis.length ? vis : state.people;
  if (!list.length) { view = {x:0,y:0,z:1}; applyView(); return; }
  const pts = list.map(p => getXY(p));
  const xs = pts.map(q=>q[0]), ys = pts.map(q=>q[1]);
  const minX = Math.min(...xs)-120, maxX = Math.max(...xs)+120;
  const minY = Math.min(...ys)-140, maxY = Math.max(...ys)+140;
  const vw = innerWidth, vh = innerHeight;
  /* スマホでは縮小しすぎない（小さくて見えないのを防ぐ） */
  const minZ = matchMedia('(pointer:coarse)').matches ? 0.45 : 0.2;
  const z = Math.min(2, Math.max(minZ, Math.min(vw/(maxX-minX), vh/(maxY-minY))));
  view = { z, x:(vw-(minX+maxX)*z)/2, y:(vh-(minY+maxY)*z)/2 };
  applyView();
}

/* 🧹 きれいに並べる（女子は左ブロック・男子は右ブロック） */
function tidyUp() {
  if (!confirm('いまの配置をリセットして、きれいに並べ直す？')) return;
  pushUndo();
  const girls = state.people.filter(p => p.gender === 'girl');
  const boys = state.people.filter(p => p.gender === 'boy');
  const rest = state.people.filter(p => p.gender !== 'girl' && p.gender !== 'boy');
  const place = (arr, startX, startY, cols) => arr.forEach((p, i) => {
    setXY(p, startX + (i % cols) * 300, startY + Math.floor(i / cols) * 280);
  });
  place(girls, 200, 200, 2);
  place(boys, 1000, 200, 3);
  place(rest, 200, 200 + Math.ceil(girls.length/2) * 280 + 200, 2);
  save(); render(); fitView();
}

    pinchStart = {
      dist: Math.hypot(a.x-b.x, a.y-b.y),
      mid: { x:(a.x+b.x)/2, y:(a.y+b.y)/2 },
      view: { ...view }
    };
  }
  board.classList.add('panning');
});
board.addEventListener('pointermove', e => {
  if (!bgPtrs.has(e.pointerId)) return;
  const prev = bgPtrs.get(e.pointerId);
  bgPtrs.set(e.pointerId, { x:e.clientX, y:e.clientY });
  if (bgPtrs.size === 1 && !pinchStart) {
    view.x += e.clientX - prev.x;
    view.y += e.clientY - prev.y;
    applyView();
  } else if (bgPtrs.size === 2 && pinchStart) {
    const [a,b] = [...bgPtrs.values()];
    const dist = Math.hypot(a.x-b.x, a.y-b.y);
    const mid = { x:(a.x+b.x)/2, y:(a.y+b.y)/2 };
    const nz = Math.min(3, Math.max(0.2, pinchStart.view.z * dist / pinchStart.dist));
    const wm = { x:(pinchStart.mid.x - pinchStart.view.x)/pinchStart.view.z,
                 y:(pinchStart.mid.y - pinchStart.view.y)/pinchStart.view.z };
    view.z = nz;
    view.x = mid.x - wm.x*nz;
    view.y = mid.y - wm.y*nz;
    applyView();
  }
});
const bgUp = e => {
  bgPtrs.delete(e.pointerId);
  if (bgPtrs.size < 2) pinchStart = null;
  if (!bgPtrs.size) board.classList.remove('panning');
};
board.addEventListener('pointerup', bgUp);
board.addEventListener('pointercancel', bgUp);

/* 背景ダブルクリック → その場所に人物追加（マウスのみ。スマホは誤爆するのでオフ） */

document.addEventListener('touchend', e => {

/* ================= 男女表示切り替え・フォーカスモード ================= */
let genderView = 'all'; /* all=男女混合 / girl=女子だけ / boy=男子だけ */
let focusId = null;     /* 誰かにフォーカス中ならそのID */

const isVisible = p => {
  if (genderView === 'all' || !p.gender || p.gender === genderView) return true;
  /* 呼び出しリストに入っていれば別性別でも表示 */
  return (state.spaceExtra[genderView] || []).includes(p.id);
};

/* 線がいまの空間のものかどうか（空間ごとに線は独立） */
const inSpace = r => (r.space || 'all') === genderView;

/* フォーカス中：その人とつながってる人かどうか（薄く表示する用） */
const inFocusGroup = p => {
  if (!focusId) return true;
  if (p.id === focusId) return true;
  return state.relations.some(r =>
    inSpace(r) &&
    (state.settings.showPred || r.confidence !== 'prediction') &&
    ((r.p1 === focusId && r.p2 === p.id) || (r.p2 === focusId && r.p1 === p.id)));
};

/* 空間ごとの座標：男女混合=x,y ／ 女子空間=gx,gy ／ 男子空間=bx,by */
function getXY(p) {
  if (genderView === 'girl') {
    if (p.gx == null) { p.gx = p.x; p.gy = p.y; }
    return [p.gx, p.gy];
  }
  if (genderView === 'boy') {
    if (p.bx == null) { p.bx = p.x; p.by = p.y; }
    return [p.bx, p.by];
  }
  return [p.x, p.y];
}
function setXY(p, x, y) {
  if (genderView === 'girl') { p.gx = x; p.gy = y; }
  else if (genderView === 'boy') { p.bx = x; p.by = y; }
  else { p.x = x; p.y = y; }
}

function setFocus(id) {
  const p = person(id);
  if (!p) return;
  focusId = id;
  document.getElementById('focusName').textContent = '🎯 ' + p.name + ' の関係図';
  document.getElementById('focusBar').style.display = 'flex';
  render(); fitView();
}
function clearFocus() {
  focusId = null;
  document.getElementById('focusBar').style.display = 'none';
  render(); fitView();
}
document.getElementById('focusOff').onclick = clearFocus;

/* ================= 描画 ================= */
function render() {
  nodesEl.innerHTML = '';
  state.people.filter(isVisible).forEach(p => {
    const n = document.createElement('div');
    n.className = 'node' + (p.id === selectedId ? ' selected' : '') + (p.gender ? ' ' + p.gender : '')
      + (focusId && !inFocusGroup(p) ? ' dim' : '');
    const [px, py] = getXY(p);
    n.style.left = px + 'px';
    n.style.top = py + 'px';
    n.dataset.id = p.id;
    const c = document.createElement('div');
    c.className = 'circle';
    if (p.image) { const im = document.createElement('img'); im.src = p.image; c.appendChild(im); }
    else c.textContent = p.gender === 'boy' ? '👦' : p.gender === 'girl' ? '👧' : '👤';
    const lk = document.createElement('div');
    lk.className = 'linker'; lk.textContent = '🔗'; lk.title = 'ドラッグして線を引く';
    const lb = document.createElement('div');
    lb.className = 'nlabel'; lb.textContent = p.name;
    n.appendChild(c); n.appendChild(lk); n.appendChild(lb);
    attachNode(n, p, lk);
    nodesEl.appendChild(n);
  });
  renderWires();
}

function renderWires(temp) {
  let svg = '';
  state.relations.forEach(r => {
    if (!inSpace(r)) return;
    if (!state.settings.showPred && r.confidence === 'prediction') return;
    const a = person(r.p1), b = person(r.p2);
    if (!a || !b || !isVisible(a) || !isVisible(b)) return;
    if (focusId && r.p1 !== focusId && r.p2 !== focusId) return;
    const t = TYPES[r.type] || TYPES.friend;
    const dash = r.confidence === 'prediction' ? ' stroke-dasharray="8 7"' : '';
    const [ax, ay] = getXY(a), [bx, by] = getXY(b);
    svg += `<line x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" stroke="${t.color}" stroke-width="4" stroke-linecap="round" opacity="0.9"${dash}/>`;
    svg += `<line class="hit" data-rid="${r.id}" x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" stroke="rgba(0,0,0,0)" stroke-width="22"/>`;
  });
  if (temp) {
    svg += `<line x1="${temp.x1}" y1="${temp.y1}" x2="${temp.x2}" y2="${temp.y2}" stroke="#ffd23f" stroke-width="4" stroke-dasharray="4 6" stroke-linecap="round"/>`;
    svg += `<circle cx="${temp.x2}" cy="${temp.y2}" r="8" fill="#ffd23f"/>`;
  }
  wires.innerHTML = svg;
  wires.querySelectorAll('.hit').forEach(l => {
    l.addEventListener('pointerdown', e => e.stopPropagation());
    l.addEventListener('click', e => {
      e.stopPropagation();
      openLineMenu(l.dataset.rid, e.clientX, e.clientY);
    });
  });
}

/* ================= ノード操作 ================= */
function attachNode(el, p, linker) {
  el.addEventListener('pointerdown', e => {
    if (e.target === linker) return;
    if (e.button !== undefined && e.button !== 0) return; /* 右クリックはメニュー用 */
    e.stopPropagation(); e.preventDefault();
    try { el.setPointerCapture(e.pointerId); } catch(_) {}
    hideMenu();
    const pid = e.pointerId;
    const startCX = e.clientX, startCY = e.clientY;
    /* つかんだ位置とアイコン中心のズレを覚えておく（絶対位置追従方式） */
    const w0 = toWorld(startCX, startCY);
    const [px0, py0] = getXY(p);
    const offX = w0.x - px0, offY = w0.y - py0;
    let moved = false, lpFired = false, lpTimer = null;

    if (e.pointerType !== 'mouse') {
      lpTimer = setTimeout(() => {
        lpFired = true;
        openNodeMenu(p.id, startCX, startCY);
        if (navigator.vibrate) navigator.vibrate(30);
      }, 520);
    }

    const move = ev => {
      if (ev.pointerId !== pid) return;
      if (!moved && Math.hypot(ev.clientX-startCX, ev.clientY-startCY) > 6) {
        moved = true; clearTimeout(lpTimer);
      }
      if (!moved || lpFired) return;
      const w = toWorld(ev.clientX, ev.clientY);
      setXY(p, w.x - offX, w.y - offY);
      const [nx, ny] = getXY(p);
      el.style.left = nx + 'px';
      el.style.top = ny + 'px';
      renderWires();
    };
    const up = ev => {
      if (ev.pointerId !== pid) return;
      clearTimeout(lpTimer);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      window.removeEventListener('pointercancel', up);
      if (moved) { save(); }
      else if (!lpFired) {
        if (lineMode) { lineTap(p.id); }
        else { selectNode(p.id); openKarte(p.id); }
      }
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    window.addEventListener('pointercancel', up);
  });

  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    openNodeMenu(p.id, e.clientX, e.clientY);
  });

  /* 🔗 ハンドルからドラッグ → 線を作成 */
  linker.addEventListener('pointerdown', e => {
    e.stopPropagation(); e.preventDefault();
    try { linker.setPointerCapture(e.pointerId); } catch(_) {}
    const pid = e.pointerId;
    const move = ev => {
      if (ev.pointerId !== pid) return;
      const w = toWorld(ev.clientX, ev.clientY);
      const [px, py] = getXY(p);
      renderWires({ x1:px, y1:py, x2:w.x, y2:w.y });
    };
    const up = ev => {
      if (ev.pointerId !== pid) return;
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      window.removeEventListener('pointercancel', up);
      /* 当たり判定①：指のちょうど下にある人物 */
      let target = null;
      const under = document.elementFromPoint(ev.clientX, ev.clientY);
      const nodeUnder = under && under.closest ? under.closest('.node') : null;
      if (nodeUnder && nodeUnder.dataset.id !== p.id) target = person(nodeUnder.dataset.id);
      /* 当たり判定②：画面上で60px以内の一番近い人物（ゆるめ） */
      if (!target) {
        const w = toWorld(ev.clientX, ev.clientY);
        let best = null, bestD = Infinity;
        state.people.filter(isVisible).forEach(q => {
          if (q.id === p.id) return;
          const [qx, qy] = getXY(q);
          const d = Math.hypot(qx-w.x, qy-w.y) * view.z;
          if (d < 60 && d < bestD) { best = q; bestD = d; }
        });
        target = best;
      }
      renderWires();
      if (target) {
        const rel = { id:'r'+Date.now(), p1:p.id, p2:target.id, type:'friend', confidence:'fact', space:genderView };
        state.relations.push(rel); save(); renderWires();
        openLineMenu(rel.id, ev.clientX, ev.clientY);
      } else {
        toast('人物の上ではなして線をつなぐよ🔗');
      }
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    window.addEventListener('pointercancel', up);
  });
}

function selectNode(id) {
  selectedId = id;
  nodesEl.querySelectorAll('.node').forEach(n =>
    n.classList.toggle('selected', n.dataset.id === id));
}

/* 🔗 線を引くモード（スマホ向け：タップ2回だけで線が引ける） */

lineFab.onclick = () => {

};
/* ↩️ 元に戻す（削除・並べ替え・書き込みを1手ずつ取り消せる） */
let undoStack = [];
function pushUndo() {
  try {
    undoStack.push(JSON.stringify({ people:state.people, relations:state.relations, spaceExtra:state.spaceExtra }));
    if (undoStack.length > 15) undoStack.shift();
  } catch(e) {}
}
document.getElementById('undoFab').onclick = () => {
  if (!undoStack.length) { toast('戻せる操作がないよ'); return; }
  const snap = JSON.parse(undoStack.pop());
  state.people = snap.people;
  state.relations = snap.relations;
  state.spaceExtra = snap.spaceExtra || { girl:[], boy:[] };
  save(); render();
  panel.classList.remove('open');
  karteEl.classList.remove('open');
  toast('1つ前に戻したよ↩️');
};

function lineTap(id) {
  if (!lineFirst) {
    lineFirst = id;
    selectNode(id);
    toast(person(id).name + ' → 線をつなぐ相手をタップ！');
    return;
  }
  if (lineFirst === id) { lineFirst = null; toast('キャンセルしたよ'); return; }
  const rel = { id:'r'+Date.now(), p1:lineFirst, p2:id, type:'friend', confidence:'fact', space:genderView };
  state.relations.push(rel);
  save(); renderWires();
  selectNode(id);
  lineFirst = null;
  openLineMenu(rel.id, innerWidth/2, innerHeight*0.35);
}

/* ================= 人物追加・削除・写真 ================= */
function addPerson(x, y) {
  const nx = x ?? toWorld(innerWidth/2, innerHeight/2).x;
  const ny = y ?? toWorld(innerWidth/2, innerHeight/2).y;
  /* 女子空間で追加→女子、男子空間で追加→男子（他の空間に勝手に出ないように） */
  const p = { id:'p'+Date.now(), name:'新しい人', image:'',
    gender: genderView === 'girl' ? 'girl' : genderView === 'boy' ? 'boy' : '',
    x: nx, y: ny,
    nickname:'', grade:'中3', club:'', birthday:'', talent:'',
    personality:'', favorite_type:'', features:'', hobby:'', notes:'' };
  setXY(p, nx, ny); /* いま見ている空間に配置 */
  state.people.push(p); save(); render();
  selectNode(p.id); openPanel(p.id);
  setTimeout(() => {
    const inp = document.querySelector('.p-name-input');
    if (inp) { inp.focus(); inp.select(); }
  }, 250);
}
document.getElementById('addBtn').onclick = () => addPerson();

function deletePerson(id) {
  const p = person(id);
  if (!p || !confirm(p.name + ' をボードから削除する？')) return;
  pushUndo();
  state.people = state.people.filter(q => q.id !== id);
  state.relations = state.relations.filter(r => r.p1 !== id && r.p2 !== id);
  if (selectedId === id) selectedId = null;
  save(); render(); closePanel();
}

const photoFile = document.getElementById('photoFile');
let photoTargetId = null;
photoFile.addEventListener('change', () => {
  const file = photoFile.files && photoFile.files[0];
  if (!file || !photoTargetId) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      cv.width = 300; cv.height = 300;
      const ctx = cv.getContext('2d');
      const m = Math.min(img.width, img.height);
      ctx.drawImage(img, (img.width-m)/2, (img.height-m)/2, m, m, 0, 0, 300, 300);
      const p = person(photoTargetId);
      if (p) { p.image = cv.toDataURL('image/jpeg', 0.85); save(); render(); openPanel(p.id); }
      photoFile.value = '';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

const panelBody = document.getElementById('panelBody');
document.getElementById('panelClose').onclick = closePanel;
function closePanel() { panel.classList.remove('open'); }
const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function openPanel(id) {
  const p = person(id);
  if (!p) return;
  selectNode(id);

    .filter(inSpace)
    .filter(r => r.p1 === id || r.p2 === id)

        <div class="g-toggle">
          <button class="girl ${p.gender==='girl'?'on':''}" id="gGirl">👧 女子</button>
          <button class="boy ${p.gender==='boy'?'on':''}" id="gBoy">👦 男子</button>

  if (rels.length) {
    html += rels.map(r => {
      const other = person(r.p1 === id ? r.p2 : r.p1);

      return `<div class="rel-item" data-rid="${r.id}">

    }).join('');
  } else {

  }
  html += `</div>

  document.getElementById('gBoy').onclick = () => {

  };

  /* 直接編集 → 自動保存 */

/* ================= 📇 人物カルテ（履歴書風） ================= */
const karteEl = document.getElementById('karte');

    .filter(inSpace)

    .filter(([k]) => byType[k])
    .map(([k, t]) => `${t.label}：${[...new Set(byType[k])].join('、')}`)
    .join('<br>');
  const v = s => (s && s.trim()) ? esc(s.trim()).replace(/\n/g,'<br>') : '<span style="color:#b0a898;">―</span>';
  const d = new Date();
  const num = String(state.people.indexOf(p) + 1).padStart(3, '0');

  document.getElementById('kPaper').innerHTML = `
    <div class="k-stamp">極秘</div>
    <div class="k-head">
      <div>
        <div class="k-title">人 物 カ ル テ</div>
        <div class="k-no">FILE No.${num}</div>

};
const QUICK_LABEL = { nickname:'ニックネーム', grade:'学年', club:'部活', birthday:'誕生日', personality:'性格', hobby:'趣味', talent:'得意', favorite_type:'好きなタイプ', features:'特徴', notes:'メモ' };

function quickClassify(t) {
  if (!t) return null;
  if (/^(あだ名|ニックネーム)は?/.test(t)) return ['nickname', t.replace(/^(あだ名|ニックネーム)は?/, '')];
  if (/誕生日|^\d{1,2}月\d{1,2}日$/.test(t)) return ['birthday', t.replace(/誕生日は?/, '')];
  if (/^(中|高)[1-3１-３]$/.test(t)) return ['grade', t];
  if (/部$|^部活は?/.test(t)) return ['club', t.replace(/^部活は?/, '')];
  if (/^趣味は?/.test(t)) return ['hobby', t.replace(/^趣味は?/, '')];
  if (/^(好きなタイプ|タイプ)は?/.test(t)) return ['favorite_type', t.replace(/^(好きなタイプ|タイプ)は?/, '')];
  if (/が?(得意|うまい|上手)$/.test(t)) return ['talent', t];
  for (const f of ['features','personality','talent','hobby']) {
    if (QUICK_KW[f].some(k => t.includes(k))) return [f, t];
  }
  return ['notes', t];
}
function quickParse(text) {
  const tokens = text.split(/[、。，,.\s/／・\n]+/).map(s => s.trim()).filter(Boolean);
  const out = {};
  tokens.forEach(t => {
    const r = quickClassify(t);
    if (!r || !r[1]) return;
    (out[r[0]] = out[r[0]] || []).push(r[1]);
  });
  return out;
}
function quickPreview() {
  const out = quickParse(document.getElementById('qText').value);
  const pv = document.getElementById('qPreview');
  pv.innerHTML = Object.keys(out).length
    ? Object.entries(out).map(([f, arr]) => `<div class="q-row"><b>${QUICK_LABEL[f]}</b>：${esc(arr.join('、'))}</div>`).join('')
    : '';
}

/* ================= ガチ同期（Firebase） ================= */
let syncRef = null, applyingRemote = false, lastPushed = '';
const syncBtn = document.getElementById('syncBtn');

function syncData() {
  /* viewは端末ごとに別（ズーム位置まで同期するとケンカするので） */
  return { people:state.people, relations:state.relations,
           settings:state.settings, spaceExtra:state.spaceExtra || {girl:[],boy:[]},
           boys10:state.boys10||true };
}

let pushTimer = null;
function pushSoon() {
  if (!syncRef || applyingRemote) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(async () => {
    const json = JSON.stringify(syncData());
    if (json === lastPushed) return;
    lastPushed = json;
    try {
      const pack = await encObj(JSON.parse(json)); /* 🔐 暗号化してからクラウドへ */
      await syncRef.set(pack);
      syncBtn.textContent = '🌐 同期:ON🔐';
    } catch (e) {
      syncBtn.textContent = '🌐 同期:エラー';
    }
  }, 700);
}

/* 初回接続時：クラウドと手元のデータを「いいとこ取り」で合体
   （空っぽの値で写真や配置を上書きしない） */
function mergeRemote(remote) {
  const localMap = new Map(state.people.map(p => [p.id, p]));
  const merged = (remote.people || []).map(rp => {
    const lp = localMap.get(rp.id);
    if (!lp) return rp;
    const out = Object.assign({}, lp, rp);
    /* リモートが空でローカルに中身がある項目はローカルを残す（写真・座標など） */
    Object.keys(lp).forEach(k => {
      const rv = rp[k];
      if ((rv === '' || rv == null) && lp[k] !== '' && lp[k] != null) out[k] = lp[k];
    });
    localMap.delete(rp.id);
    return out;
  });
  localMap.forEach(lp => merged.push(lp)); /* リモートにない人も消さず残す */
  const relIds = new Set((remote.relations || []).map(r => r.id));
  const rels = (remote.relations || []).slice();
  (state.relations || []).forEach(r => { if (!relIds.has(r.id)) rels.push(r); });
  return {
    people: merged,
    relations: rels,
    settings: remote.settings || state.settings,
    spaceExtra: remote.spaceExtra || state.spaceExtra
  };
}

function initSync() {
  if (!FIREBASE_CONFIG || !FIREBASE_CONFIG.databaseURL) {
    syncBtn.textContent = '🌐 同期:未設定';
    syncBtn.classList.add('off');
    syncBtn.onclick = () => toast('コード内のFIREBASE_CONFIGを設定すると同期できるよ');
    return;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    syncRef = firebase.database().ref('kankeiBoard');
    syncBtn.textContent = '🌐 同期:接続中…';
    syncBtn.onclick = () => toast('クラウドと自動同期中！どの端末で編集してもOK');
    initChat();
    let firstSync = true;

    syncRef.on('value', async snap => {
      let remote = snap.val();
      /* 🔐 暗号文パックなら復号（鍵が違うと読めない） */
      if (remote && remote.e === 1) {
        try { remote = await decObj(remote); }
        catch (e) { syncBtn.textContent = '🌐 同期:鍵が違う…'; return; }
      }
      if (!remote || !Array.isArray(remote.people)) {
        /* クラウドが空 → 今の手元データをアップ */
        firstSync = false;
        pushSoon();
        syncBtn.textContent = '🌐 同期:ON';
        return;
      }
      const json = JSON.stringify(remote);
      if (json === lastPushed || json === JSON.stringify(syncData())) {
        firstSync = false;
        syncBtn.textContent = '🌐 同期:ON';
        return;
      }
      applyingRemote = true;
      const wasFirst = firstSync;
      if (firstSync) {
        /* 初回はクラウドと手元を合体（写真・配置を空データで潰さない） */
        firstSync = false;
        const m = mergeRemote(remote);
        state.people = m.people;
        state.relations = m.relations;
        state.settings = m.settings || { showPred:true };
        state.spaceExtra = m.spaceExtra || { girl:[], boy:[] };
      } else {
        /* 2回目以降＝他端末のリアルタイム編集をそのまま反映 */
        state.people = remote.people;
        state.relations = remote.relations || [];
        state.settings = remote.settings || { showPred:true };
        state.spaceExtra = remote.spaceExtra || { girl:[], boy:[] };
      }
      state.spaceExtra.girl = state.spaceExtra.girl || [];
      state.spaceExtra.boy = state.spaceExtra.boy || [];
      state.boys10 = true;
      lastPushed = wasFirst ? '' : json;
      try { localStorage.setItem(LS, JSON.stringify(state)); } catch(e) {}
      applyingRemote = false;
      if (wasFirst) pushSoon(); /* 合体結果をクラウドにも反映 */
      syncPred(); render();
      if (panel.classList.contains('open') && selectedId && person(selectedId)) openPanel(selectedId);
      syncBtn.textContent = '🌐 同期:ON🔐';
    }, () => { syncBtn.textContent = '🌐 同期:エラー'; });
  } catch(e) {
    syncBtn.textContent = '🌐 同期:エラー';
  }
}

/* ================= 💬 チャット ================= */
const chatFab = document.getElementById('chatFab');
const chatBox = document.getElementById('chatBox');
const chatMsgs = document.getElementById('chatMsgs');
const chatNameIn = document.getElementById('chatName');
const chatTextIn = document.getElementById('chatText');
chatNameIn.value = localStorage.getItem('chatName') || '';
chatFab.onclick = () => toast('チャットは同期(Firebase)設定が必要だよ');
document.getElementById('chatClose').onclick = () => chatBox.classList.remove('open');

const cleanKey = s => (s||'').replace(/[.#$\/\[\]]/g, '_');
const myName = () => (localStorage.getItem('chatName') || '').trim();

function initChat() {
  const db = firebase.database();
  const chatRef = db.ref('chat');
  const readRef = db.ref('chatRead');   /* 既読管理 */
  const presRef = db.ref('presence');   /* オンライン/オフライン */
  let latestTs = 0, reads = {}, presence = {};

  /* ---- なまえ（初回に聞く） ---- */
  setTimeout(() => {
    if (!myName()) {
      const nm = prompt('参加者リストとチャットで使う「なまえ」を入れてね！');
      if (nm && nm.trim()) {
        localStorage.setItem('chatName', nm.trim());
        chatNameIn.value = nm.trim();
      }
    }
    goOnline();
  }, 800);

  function goOnline() {
    const nm = myName();
    if (!nm) return;
    const r = presRef.child(cleanKey(nm));
    r.set({ name:nm, online:true, last:Date.now() });
    /* 閉じたら自動でオフラインになる */
    r.onDisconnect().set({ name:nm, online:false, last:firebase.database.ServerValue.TIMESTAMP });
  }

  /* ---- 🟢 参加者リスト ---- */
  const whoBtn = document.getElementById('whoBtn');
  presRef.on('value', s => {
    presence = s.val() || {};
    const onl = Object.values(presence).filter(u => u && u.online).length;
    whoBtn.textContent = '🟢 参加者:' + onl;
  });
  whoBtn.onclick = e => {
    e.stopPropagation();
    const entries = Object.entries(presence).filter(([k,u]) => u);
    let html = `<div style="font-size:0.7rem;color:#b3a6e8;padding:4px 12px;">参加者（きみは「${esc(myName()||'名前未設定')}」）</div>`;
    if (!entries.length) html += `<div style="padding:8px 12px;font-size:0.8rem;color:#7a7398;">まだ誰も参加してないよ</div>`;
    entries.sort((a,b) => (b[1].online?1:0) - (a[1].online?1:0)).forEach(([key,u]) => {
      const d = new Date(u.last || 0);
      const t = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      html += `<div style="padding:5px 8px 5px 12px;font-size:0.85rem;display:flex;align-items:center;gap:6px;">
        <span style="flex:1;">${u.online?'🟢':'⚪'} ${esc(u.name||'?')} <span style="font-size:0.65rem;color:#8a82b0;">${u.online?'オンライン':'最終 '+t}</span></span>
        <button data-kick="${esc(key)}" style="width:auto;flex:0 0 auto;padding:4px 10px;color:#ff9ab5;">✕</button>
      </div>`;
    });
    html += `<hr><button id="whoRename">✏️ なまえを変える</button>`;
    showMenu(html, e.clientX || 20, (e.clientY || 50) + 10);
    fmenu.querySelectorAll('button[data-kick]').forEach(b => b.onclick = ev => {
      ev.stopPropagation();
      const u = presence[b.dataset.kick];
      if (!confirm((u && u.name ? u.name : 'この人') + ' を参加者リストから消す？')) return;
      presRef.child(b.dataset.kick).remove();
      hideMenu();
      toast('参加者リストから消したよ');
    });
    document.getElementById('whoRename').onclick = () => {
      hideMenu();
      const nm = prompt('新しいなまえ', myName());
      if (nm && nm.trim()) {
        localStorage.setItem('chatName', nm.trim());
        chatNameIn.value = nm.trim();
        goOnline();
      }
    };
  };

  /* ---- 既読（LINE風） ---- */
  readRef.on('value', s => { reads = s.val() || {}; updateReadMarks(); });
  function markRead() {
    const nm = myName();
    if (!nm || !latestTs || !chatBox.classList.contains('open')) return;
    readRef.child(cleanKey(nm)).set(latestTs);
  }
  function updateReadMarks() {
    const me = cleanKey(myName());
    chatMsgs.querySelectorAll('.cmsg[data-own="1"]').forEach(el => {
      const ts = +el.dataset.ts;
      const n = Object.keys(reads).filter(k => k !== me && reads[k] >= ts).length;
      const sp = el.querySelector('.cread');
      if (sp) sp.textContent = n > 0 ? '既読' + n : '';
    });
  }

  /* ---- チャット本体 ---- */
  chatFab.onclick = () => {
    chatBox.classList.toggle('open');
    chatFab.classList.remove('unread');
    if (chatBox.classList.contains('open')) {
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
      markRead();
      chatTextIn.focus();
    }
  };
  chatRef.limitToLast(100).on('child_added', async snap => {
    let m = snap.val();
    /* 🔐 暗号化メッセージなら復号 */
    if (m && m.e === 1) {
      try { m = Object.assign({}, await decObj(m), { ts: m.ts }); }
      catch (e) { return; } /* 鍵が違うメッセージは表示しない */
    }
    if (!m || !m.t) return;
    latestTs = Math.max(latestTs, m.ts || 0);
    const own = m.n === myName();
    const d = new Date(m.ts || Date.now());
    const hh = String(d.getHours()).padStart(2,'0'), mm = String(d.getMinutes()).padStart(2,'0');
    const div = document.createElement('div');
    div.className = 'cmsg';
    div.dataset.ts = m.ts || 0;
    div.dataset.own = own ? '1' : '0';
    div.innerHTML = `<div><span class="cname">${esc(m.n || '？')}</span><span class="ctime">${hh}:${mm}</span><span class="cread"></span></div>
      <span class="ctext">${esc(m.t)}</span>`;
    chatMsgs.appendChild(div);
    while (chatMsgs.children.length > 120) chatMsgs.removeChild(chatMsgs.firstChild);
    chatMsgs.scrollTop = chatMsgs.scrollHeight;
    if (chatBox.classList.contains('open')) markRead();
    else chatFab.classList.add('unread');
    updateReadMarks();
  });
  function sendChat() {
    const name = chatNameIn.value.trim();
    const text = chatTextIn.value.trim();
    if (!name) { toast('なまえを入れてね！'); chatNameIn.focus(); return; }
    if (!text) return;
    if (name !== myName()) { localStorage.setItem('chatName', name); goOnline(); }
    /* 🔐 メッセージも暗号化して送信（tsだけ並び順・既読用に外に残す） */
    encObj({ n:name, t:text, ts:Date.now() }).then(pack => {
      pack.ts = Date.now();
      chatRef.push(pack);
    });
    chatTextIn.value = '';
    chatTextIn.focus();
  }
  document.getElementById('chatSend').onclick = sendChat;
  chatTextIn.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
}

/* ================= 起動 ================= */
render(); // v2
if (state.view) applyView(); else fitView();
/* 🔐 あいことば入力（＝鍵の準備）が済んでから同期スタート */
cryptoReady.then(() => initSync());
</script>
